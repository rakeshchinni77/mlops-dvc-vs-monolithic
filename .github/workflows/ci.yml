name: CI/CD Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  DVC_NO_ANALYTICS: "1"

jobs:
  validate:
    name: Validate Monolithic and DVC Pipelines
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Verify Python version
        run: |
          set -euo pipefail
          python --version
          python -c "import sys; assert sys.version_info[:2] == (3, 10)"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Confirm DVC availability
        run: |
          set -euo pipefail
          dvc --version
          python -c "import dvc; print(dvc.__version__)"

      - name: Run monolithic training pipeline
        run: |
          set -euo pipefail
          python train_monolithic.py

      - name: Validate monolithic artifacts
        run: |
          set -euo pipefail
          test -f model.joblib
          test -f metrics.json

      - name: Run DVC pipeline
        run: |
          set -euo pipefail
          dvc repro

      - name: Validate DVC artifacts
        run: |
          set -euo pipefail
          test -f models/model.joblib
          test -f metrics/scores.json
          test -f data/processed.csv
          test -f data/features.npz

      - name: Validate DVC cache behavior
        run: |
          set -euo pipefail
          dvc repro 2>&1 | tee dvc_repro.log
          grep -E "Stage 'prepare' didn't change, skipping|Stage 'featurize' didn't change, skipping|Stage 'train' is cached - skipping run|Stage 'evaluate' is cached - skipping run" dvc_repro.log

      - name: Confirm clean DVC status
        run: |
          set -euo pipefail
          dvc status --quiet
