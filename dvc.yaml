stages:
  prepare:
    cmd: python src/prepare.py --input data/adult.csv --output data/processed.csv
    deps:
      - src/prepare.py
      - data/adult.csv
    outs:
      - data/processed.csv

  featurize:
    cmd: python src/featurize.py --input data/processed.csv --output data/features.npz
    deps:
      - src/featurize.py
      - data/processed.csv
    params:
      - prepare.random_state
      - prepare.test_size
    outs:
      - data/features.npz

  train:
    cmd: python src/train.py --input data/features.npz --output models/model.joblib
    deps:
      - src/train.py
      - data/features.npz
    params:
      - train.model_type
      - train.n_estimators
      - train.max_depth
      - train.random_state
    outs:
      - models/model.joblib

  evaluate:
    cmd: python src/evaluate.py --model models/model.joblib --data data/features.npz --metrics metrics/scores.json
    deps:
      - src/evaluate.py
      - models/model.joblib
      - data/features.npz
    metrics:
      - metrics/scores.json:
          cache: false
